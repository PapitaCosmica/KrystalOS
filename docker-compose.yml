services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://krystal:krystal@db:5432/krystalos
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=krystal
      - POSTGRES_PASSWORD=krystal
      - POSTGRES_DB=krystalos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krystal -d krystalos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
