<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KrystalOS 🔷 Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #09090e 0%, #1a153a 50%, #0d0b1a 100%);
      min-height: 100vh;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1440px;
      margin: 0 auto;
    }

    .bento-cell {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      border-radius: 1.5rem;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .bento-cell:hover {
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
    }
    
    /* Responsive fallback */
    @media (max-width: 1024px) {
      .bento-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .bento-grid { grid-template-columns: minmax(0, 1fr); }
      .bento-cell { grid-column: span 1 !important; grid-row: span 1 !important; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="p-6 flex justify-between items-center max-w-[1440px] mx-auto border-b border-white/10">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🔷</span>
      <div>
        <h1 class="text-xl font-bold tracking-tight">KrystalOS</h1>
        <p class="text-xs text-white/50">Orchestrator Dashboard</p>
      </div>
    </div>
    <div class="flex gap-4">
      <span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-500/20 text-green-400 border border-green-500/30">
        System: Active
      </span>
      <span class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/20 text-blue-400 border border-blue-500/30">
        Widgets: {{ widgets|length }}
      </span>
    </div>
  </header>

  <!-- Bento Area -->
  <main class="bento-grid">
    {% for widget in widgets %}
    <section 
      class="bento-cell" 
      style="grid-column: span {{ widget.grid.w }}; grid-row: span {{ widget.grid.h }};"
      id="widget-slot-{{ widget.name }}"
      data-widget="{{ widget.name }}">
      <!-- Shadow DOM injected here -->
      <div class="w-full h-full flex items-center justify-center p-8 text-white/30 animate-pulse">
        Loading {{ widget.name }}...
      </div>
    </section>
    {% endfor %}

    {% if not widgets %}
    <div class="col-span-12 text-center py-20">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/5 mb-6">
        <span class="text-4xl">🧩</span>
      </div>
      <h2 class="text-xl font-medium mb-2">No widgets found</h2>
      <p class="text-white/50 max-w-sm mx-auto">
        Run <code>krystal make:widget</code> in your terminal to create your first widget.
      </p>
    </div>
    {% endif %}
  </main>

  <script>
    // System to inject widget UI files securely via Shadow DOM
    document.addEventListener("DOMContentLoaded", async () => {
      const slots = document.querySelectorAll('[id^="widget-slot-"]');
      
      for (const slot of slots) {
        const widgetName = slot.dataset.widget;
        try {
          // Fetch the widget's ui.html through the gateway proxy
          const res = await fetch(`/api/${widgetName}/ui.html`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          
          const html = await res.text();
          
          // Clear loading state
          slot.innerHTML = '';
          
          // Isolate widget styles/scripts using Shadow DOM (Open mode for Event Bus access)
          const shadow = slot.attachShadow({ mode: 'open' });
          shadow.innerHTML = html;
        } catch (err) {
          console.error(`Failed to load UI for ${widgetName}:`, err);
          slot.innerHTML = `
            <div class="w-full h-full p-6 flex flex-col items-center justify-center text-center bg-red-950/30">
              <span class="text-3xl mb-3">⚠️</span>
              <h3 class="font-medium text-red-400">Failed to load</h3>
              <p class="text-xs text-red-400/70 mt-1">${widgetName}</p>
            </div>
          `;
        }
      }
    });
  </script>
</body>
</html>
