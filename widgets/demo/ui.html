<div
  class="krystal-widget-demo p-5 text-white h-full flex flex-col justify-center items-center"
>
  <h2 class="text-xl font-bold mb-2">Demo Widget</h2>
  <p class="text-sm opacity-80">Connected & Live</p>
  <button
    class="mt-4 px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg backdrop-blur-sm transition-all shadow-lg"
    onclick="demoAction()"
  >
    Click Me
  </button>
</div>

<script>
    // Forward Right Click to main OS Canvas
    document.addEventListener('contextmenu', (e) => {
        if(window.parent && window.parent.krystalOS) {
            e.preventDefault();
            window.parent.krystalOS.showContextMenu(e.clientX + window.screenX, e.clientY + window.screenY, null, 'demo');
        }
    });
</script>
