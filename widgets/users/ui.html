<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/public/css/glass.css">
    <style>
        .users-widget {
            padding: 1rem;
            color: var(--krystal-text);
            height: 100%;
            overflow-y: auto;
            font-family: 'Inter', sans-serif;
        }
        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .users-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }
        .btn-add {
            background: var(--focus-ring-color);
            color: #fff;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .users-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            font-size: 0.9rem;
            margin-top: -10px;
        }
        .users-table th {
            text-align: left;
            padding: 0 1.2rem;
            border: none;
            opacity: 0.5;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .users-table td {
            text-align: left;
            padding: 1rem 1.2rem;
            background: var(--base-glass-bg);
            border: none;
            backdrop-filter: var(--base-glass-blur);
            transition: all 0.2s ease;
        }
        .users-table tr td:first-child {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            font-weight: 600;
        }
        .users-table tr td:last-child {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }
        .users-table tbody tr {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .users-table tbody tr:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }
        .users-table tbody tr:hover td {
            background: var(--menu-hover);
        }
        .role-badge {
            background: rgba(37, 99, 235, 0.2);
            color: #3b82f6;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* Modal Add User */
        .add-user-form {
            display: none;
            background: rgba(0,0,0,0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .add-user-form.active {
            display: block;
        }
        .form-row {
            margin-bottom: 0.5rem;
        }
        .form-row input, .form-row select {
            width: 100%;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--base-glass-border);
            background: rgba(255,255,255,0.1);
            color: var(--krystal-text);
        }
    </style>
</head>
<body style="background: transparent; margin: 0;">

<div class="users-widget">
    <div class="users-header">
        <h3>👥 Gestión de Usuarios</h3>
        <button class="btn-add" onclick="toggleForm()">+ Nuevo Usuario</button>
    </div>

    <div class="add-user-form" id="addUserForm">
        <div class="form-row">
            <input type="text" id="newName" placeholder="Nombre completo">
        </div>
        <div class="form-row">
            <input type="email" id="newEmail" placeholder="Correo / Usuario">
        </div>
        <div class="form-row">
            <select id="newRole">
                <option value="user">Usuario Estándar</option>
                <option value="admin">Administrador</option>
            </select>
        </div>
        <button class="btn-add" onclick="createUser()">Guardar</button>
    </div>

    <table class="users-table">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
            </tr>
        </thead>
        <tbody id="usersList">
            <!-- Simulated Users -->
            <tr>
                <td>Admin Principal</td>
                <td>admin@empresa.com</td>
                <td><span class="role-badge">Admin</span></td>
            </tr>
            <tr>
                <td>Juan Pérez</td>
                <td>jperez@empresa.com</td>
                <td><span class="role-badge" style="background: rgba(16,185,129,0.2); color: #10b981;">User</span></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function toggleForm() {
        document.getElementById('addUserForm').classList.toggle('active');
    }

    function createUser() {
        const name = document.getElementById('newName').value;
        const email = document.getElementById('newEmail').value;
        const role = document.getElementById('newRole').value;
        
        if(!name || !email) return;

        const tbody = document.getElementById('usersList');
        const badgeColor = role === 'admin' ? '#3b82f6' : '#10b981';
        const badgeBg = role === 'admin' ? 'rgba(37,99,235,0.2)' : 'rgba(16,185,129,0.2)';

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${name}</td>
            <td>${email}</td>
            <td><span class="role-badge" style="background: ${badgeBg}; color: ${badgeColor};">${role}</span></td>
        `;
        tbody.appendChild(tr);

        // Reset
        document.getElementById('newName').value = '';
        document.getElementById('newEmail').value = '';
        toggleForm();

        // Notify parent OS
        window.parent.krystalOS?.showNotification("Usuario Creado", `El usuario ${name} fue añadido exitosamente.`, "success");
    }

    // Forward Right Click to main OS Canvas
    document.addEventListener('contextmenu', (e) => {
        if(window.parent && window.parent.krystalOS) {
            e.preventDefault();
            // Try to approximate coordinates by getting iframe offset if possible, 
            // otherwise just pass raw coordinates relative to the iframe.
            // In a real Desktop engine, we'd map bounding rects. Here we just trigger.
            // Since we can't easily position it exactly under cursor due to iframe isolation without rect math:
            window.parent.krystalOS.showContextMenu(e.clientX + window.screenX, e.clientY + window.screenY, null);
        }
    });

</script>

</body>
</html>
